version: "3.9"

services:

  neo4j:
    image: neo4j:5
    container_name: neo4j
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - neo4j

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend